name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf automake libtool pkg-config zlib1g-dev libncurses5 libncursesw5 cmake libffi-dev libssl-dev patch python3-setuptools build-essential
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: 🛠️ Build APK
        run: |
          # אישור רישיונות והתקנת build-tools 33
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;33.0.0" "platforms;android-31" "platform-tools"
          
          # יצירת תיקיית היעד של buildozer והעתקת הכלים לשם ידנית
          mkdir -p .buildozer/android/platform/android-sdk/build-tools/
          cp -r $ANDROID_HOME/build-tools/33.0.0 .buildozer/android/platform/android-sdk/build-tools/33.0.0
          
          # הגדרת משתני סביבה קשיחים
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export P4A_SDK_DIR=$ANDROID_HOME
          export P4A_NDK_DIR=$ANDROID_NDK_HOME
          
          # הרצת הבנייה עם פקודה שמדלגת על עדכוני SDK
          buildozer -v android debug
