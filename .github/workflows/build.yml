name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf automake libtool pkg-config zlib1g-dev libncurses5 libncursesw5 cmake libffi-dev libssl-dev patch python3-setuptools build-essential
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
          # התקנה ידנית של python-for-android למניעת השגיאה שקיבלת
          pip install python-for-android

      - name: 🛠️ Build APK
        run: |
          # ניקוי ובנייה
          buildozer android clean
          yes | buildozer android debug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: ./**/*.apk
